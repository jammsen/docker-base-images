name: ci-build

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'Run the pipeline?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 7 * * 6'
  push:
    branches:
      - 'master'

jobs:

  # ============================================================
  # debian-bookworm
  # ============================================================

  bookworm-base:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enabled == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Runner Info
        uses: ./.github/actions/runner-info
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: debian/bookworm
          file: debian/bookworm/Dockerfile.base
          tags: jammsen/base:debian-bookworm-base
      - name: Run Snyk scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          image: jammsen/base:debian-bookworm-base
          args: --file=debian/bookworm/Dockerfile.base --severity-threshold=high --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

  bookworm-wine-stable:
    runs-on: ubuntu-latest
